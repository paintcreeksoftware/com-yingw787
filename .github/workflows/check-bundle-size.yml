name: Bundle size

on:
  push:
  pull_request:

concurrency:
  group: bundle-size-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle-size:
    name: Bundle size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
      - run: npx bundlewatch
        env:
          BUNDLEWATCH_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
