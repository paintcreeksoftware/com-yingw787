name: Check secrets

on:
  push:
  pull_request:

concurrency:
  group: check-secrets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@v3.88.1
        with:
          extra_args: >-
            ${{ github.event_name == 'pull_request'
              && format('--since-commit {0}', github.event.pull_request.base.sha)
              || '--only-verified' }}
