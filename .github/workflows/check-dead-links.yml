name: Check dead links

on:
  push:
  pull_request:

concurrency:
  group: check-dead-links-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-dead-links:
    name: Check dead links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run check-dead-links
