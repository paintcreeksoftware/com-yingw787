name: Deploy

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
      - uses: FirebaseExtended/action-hosting-deploy@v0
        id: firebase
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          channelId: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'live' }}
      - name: Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ steps.firebase.outputs.details_url || format('https://{0}.web.app', vars.FIREBASE_PROJECT_ID) }}
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      - name: Print Lighthouse scores
        uses: actions/github-script@v7
        with:
          script: |
            const manifest = ${{ steps.lighthouse.outputs.manifest }}
            const summary = manifest[0].summary
            const scores = {
              Performance:    Math.round(summary.performance * 100),
              Accessibility:  Math.round(summary.accessibility * 100),
              'Best practices': Math.round(summary['best-practices'] * 100),
              SEO:            Math.round(summary.seo * 100),
            }
            const lines = Object.entries(scores).map(([k, v]) => `${k}: ${v}`)
            console.log('Lighthouse scores\n' + lines.join('\n'))
